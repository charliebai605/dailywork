name: Update Exchange Rate

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-rate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Update rates.json
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          python3 << 'EOF'
          import json, urllib.request, urllib.error
          from datetime import datetime

          try:
              with urllib.request.urlopen('https://api.exchangerate-api.com/v4/latest/JPY', timeout=10) as r:
                  rate = json.loads(r.read().decode()).get('rates', {}).get('TWD', 0.197)
          except:
              rate = 0.197

          try:
              with open('rates.json', 'r', encoding='utf-8') as f:
                  data = json.load(f)
          except:
              data = {'rates': []}

          today = datetime.utcnow().strftime('%Y-%m-%d')
          data['lastUpdated'] = datetime.utcnow().isoformat() + 'Z'

          existing = next((r for r in data['rates'] if r['date'] == today), None)
          if existing:
              existing['rate'] = round(rate, 4)
          else:
              data['rates'].insert(0, {'date': today, 'rate': round(rate, 4), 'source': 'exchangerate-api.com'})

          data['rates'] = data['rates'][:30]

          with open('rates.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print(f"✅ 1 JPY = {rate:.4f} TWD ({today})")
          EOF

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add rates.json
          git diff-index --quiet HEAD || git commit -m "chore: update exchange rate [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LANG: "en_US.UTF-8"
          LC_ALL: "en_US.UTF-8"
