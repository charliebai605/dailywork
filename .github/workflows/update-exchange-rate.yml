name: Update Exchange Rate

on:
  schedule:
    # 每天早上 8 點 UTC (台灣時間 16:00) 更新匯率
    - cron: '0 8 * * *'
  workflow_dispatch:  # 手動觸發

jobs:
  update-rate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Update exchange rate
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          LANG: "en_US.UTF-8"
          LC_ALL: "en_US.UTF-8"
        run: |
          python3 << 'EOF'
          import json
          from datetime import datetime
          import urllib.request
          import urllib.error

          # 獲取當前匯率
          try:
              with urllib.request.urlopen('https://api.exchangerate-api.com/v4/latest/JPY', timeout=10) as response:
                  data = json.loads(response.read().decode())
                  current_rate = data.get('rates', {}).get('TWD', 0.197)
          except urllib.error.URLError:
              print("Failed to fetch exchange rate, using default")
              current_rate = 0.197

          # 讀取現有數據
          try:
              with open('data.json', 'r', encoding='utf-8') as f:
                  expense_data = json.load(f)
          except:
              print("Failed to load data.json")
              exit(1)

          # 更新匯率歷史
          if 'exchangeRates' not in expense_data:
              expense_data['exchangeRates'] = []

          today = datetime.utcnow().strftime('%Y-%m-%d')
          new_rate = {
              'date': today,
              'rate': round(current_rate, 4),
              'source': 'exchangerate-api.com'
          }

          # 檢查今天是否已有記錄，有則更新，沒有則添加
          rate_exists = False
          for rate in expense_data['exchangeRates']:
              if rate['date'] == today:
                  rate['rate'] = new_rate['rate']
                  rate_exists = True
                  break

          if not rate_exists:
              expense_data['exchangeRates'].insert(0, new_rate)

          # 保持最近30條記錄
          expense_data['exchangeRates'] = expense_data['exchangeRates'][:30]

          # 更新 metadata
          if 'metadata' not in expense_data:
              expense_data['metadata'] = {}
          expense_data['metadata']['lastUpdated'] = datetime.utcnow().isoformat() + 'Z'

          # 重新計算預估台幣
          if 'expenses' in expense_data:
              for expense in expense_data['expenses']:
                  if expense.get('amountJPY', 0) > 0:
                      expense['estimateTWD'] = round(expense['amountJPY'] * current_rate)
                      if not expense.get('actualTWD') and expense.get('estimateTWD'):
                          expense['actualTWD'] = expense['estimateTWD']

          # 寫回文件
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(expense_data, f, ensure_ascii=False, indent=2)

          print(f"✅ Exchange rate updated: 1 JPY = {current_rate:.4f} TWD")
          print(f"📝 Updated at: {today}")
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git config --local core.quotepath false
          git add data.json
          git diff-index --quiet HEAD || git commit -m "chore: update exchange rate [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          LANG: "en_US.UTF-8"
          LC_ALL: "en_US.UTF-8"
