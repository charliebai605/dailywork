<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本實習支出記帳</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🇯🇵 日本實習支出記帳</h1>
            <div class="subtitle">記錄暑期實習期間的支出情況</div>
        </header>

        <div class="stats">
            <div class="stat-card paid">
                <div class="stat-label">已支出</div>
                <div class="stat-value">-</div>
            </div>
            <div class="stat-card pending">
                <div class="stat-label">未來支出</div>
                <div class="stat-value">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">總支出</div>
                <div class="stat-value">-</div>
            </div>
        </div>

        <div class="exchange-rate-box">
            <div class="exchange-rate-info">
                <div>
                    <div class="rate-label">當前匯率 (JPY → TWD)</div>
                    <div class="rate-value">1 JPY = <span id="rate-display">0.197</span> TWD</div>
                </div>
            </div>
            <button class="refresh-btn" onclick="tracker.updateExchangeRate(); tracker.recalculateEstimates(); tracker.render();">
                🔄 更新匯率
            </button>
        </div>

        <div class="main-content">
            <h2 class="table-title">支出詳情</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>項目</th>
                            <th>分類</th>
                            <th>金額 (JPY)</th>
                            <th>預估台幣</th>
                            <th>實際台幣</th>
                            <th>狀態</th>
                            <th>備註</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="8" style="text-align: center; padding: 40px; color: #6b7280;">
                                正在加載...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <footer>
            <div class="last-updated">⏰ 上次更新: -</div>
            <div>💾 數據來源: data.json | 匯率來源: exchangerate-api.com</div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
