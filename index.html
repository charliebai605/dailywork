<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本實習支出記帳</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🇯🇵 日本實習支出記帳</h1>
            <div class="subtitle">記錄暑期實習期間的支出情況</div>
        </header>

        <div class="stats">
            <div class="stat-card paid">
                <div class="stat-label">已支出</div>
                <div class="stat-value">-</div>
            </div>
            <div class="stat-card pending">
                <div class="stat-label">未來支出</div>
                <div class="stat-value">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">總支出</div>
                <div class="stat-value">-</div>
            </div>
        </div>

        <div class="exchange-rate-box">
            <div class="exchange-rate-info">
                <div>
                    <div class="rate-label">當前匯率 (JPY → TWD)</div>
                    <div class="rate-value">1 JPY = <span id="rate-display">0.197</span> TWD</div>
                </div>
            </div>
            <button class="refresh-btn" onclick="tracker.updateExchangeRate(); tracker.recalculateEstimates(); tracker.render();">
                🔄 更新匯率
            </button>
        </div>

        <div class="main-content">
            <h2 class="table-title">支出詳情</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>項目</th>
                            <th>分類</th>
                            <th>金額 (JPY)</th>
                            <th>預估台幣</th>
                            <th>實際台幣</th>
                            <th>狀態</th>
                            <th>備註</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="8" style="text-align: center; padding: 40px; color: #6b7280;">
                                正在加載...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 新增支出按鈕 -->
        <div class="add-btn-wrap">
            <button class="add-btn" onclick="toggleForm()">＋ 新增支出</button>
        </div>

        <!-- 新增支出表單 -->
        <div id="add-form" class="add-form-wrap" style="display:none;">
            <div class="form-card">
                <h3 style="margin-bottom: 20px;">新增支出</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label>項目名稱</label>
                        <input type="text" id="f-name" placeholder="例：便利商店" />
                    </div>
                    <div class="form-group">
                        <label>日期</label>
                        <input type="date" id="f-date" />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>分類</label>
                        <select id="f-category">
                            <option value="Food">食物</option>
                            <option value="Transport">交通</option>
                            <option value="Housing">住宿</option>
                            <option value="Flight">機票</option>
                            <option value="Other">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>金額 (JPY) <span style="color:#6b7280; font-size:0.85em;">台幣支出填 0</span></label>
                        <input type="number" id="f-jpy" placeholder="0" min="0" />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>實際台幣 <span style="color:#6b7280; font-size:0.85em;">（選填）</span></label>
                        <input type="number" id="f-twd" placeholder="留空則自動預估" min="0" />
                    </div>
                    <div class="form-group" style="display:flex; align-items:center; gap:10px; padding-top:24px;">
                        <input type="checkbox" id="f-paid" style="width:18px; height:18px; cursor:pointer;" />
                        <label for="f-paid" style="margin:0; cursor:pointer;">已支出</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>備註 <span style="color:#6b7280; font-size:0.85em;">（選填）</span></label>
                    <input type="text" id="f-notes" placeholder="備註說明" />
                </div>

                <div class="form-group">
                    <label>GitHub Token <span style="color:#6b7280; font-size:0.85em;">（會記住，不用每次輸入）</span></label>
                    <input type="password" id="f-token" placeholder="ghp_xxxx 或 gho_xxxx" />
                </div>

                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="submit-btn" onclick="addExpense()">儲存</button>
                    <button class="cancel-btn" onclick="toggleForm()">取消</button>
                </div>

                <div id="form-msg" style="margin-top:15px; display:none;"></div>
            </div>
        </div>

        <footer>
            <div class="last-updated">⏰ 上次更新: -</div>
            <div>💾 數據來源: data.json | 匯率來源: exchangerate-api.com</div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
