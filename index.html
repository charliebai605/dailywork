<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記帳啦啦啦</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 鎖定畫面 -->
    <div id="lock-screen" class="lock-screen" style="display:none;">
        <div class="lock-card">
            <div class="lock-icon">🔐</div>
            <h2>記帳啦啦啦</h2>
            <p class="lock-subtitle">輸入密碼以查看支出記錄</p>
            <input type="password" id="lock-password" placeholder="輸入密碼" autofocus />
            <button onclick="submitPassword()">解鎖</button>
            <div id="lock-error" class="lock-error" style="display:none;"></div>
        </div>
    </div>

    <!-- 主畫面 -->
    <div class="container">
        <header>
            <h1>記帳啦啦啦</h1>
            <div class="header-actions">
                <span class="subtitle">記錄暑期實習期間的支出情況</span>
                <button class="lock-btn" onclick="lockApp()" title="鎖定">🔒 鎖定</button>
            </div>
        </header>

        <div class="stats" id="stats"></div>

        <!-- 西瓜卡餘額 -->
        <div class="suica-panel" id="suica-panel"></div>

        <div class="category-stats" id="category-stats"></div>

        <div class="exchange-rate-box">
            <div class="exchange-rate-info">
                <div>
                    <div class="rate-label">當前匯率 (JPY → TWD)</div>
                    <div class="rate-value">1 JPY = <span id="rate-display">0.197</span> TWD</div>
                </div>
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button class="refresh-btn" onclick="tracker.updateExchangeRate().then(()=>{tracker.recalculateEstimates();tracker.render();})">🔄 更新匯率</button>
                <button class="export-btn" onclick="exportCSV()">📥 匯出 CSV</button>
            </div>
        </div>

        <div class="filter-bar">
            <select id="filter-category" onchange="tracker.render()">
                <option value="">全部分類</option>
                <option value="Food">食物</option>
                <option value="Transport">交通</option>
                <option value="Housing">住宿</option>
                <option value="Flight">機票</option>
                <option value="Other">其他</option>
            </select>
            <select id="filter-payment" onchange="tracker.render()">
                <option value="">全部付款</option>
                <option value="cash">現金</option>
                <option value="suica">西瓜卡</option>
                <option value="suica-topup">西瓜卡儲值</option>
                <option value="card">信用卡</option>
            </select>
            <select id="filter-status" onchange="tracker.render()">
                <option value="">全部狀態</option>
                <option value="paid">已支出</option>
                <option value="pending">未支出</option>
            </select>
        </div>

        <div class="main-content">
            <div class="table-wrapper" id="table-wrapper">
                <p style="text-align:center; padding:40px; color:#6b7280;">正在加載...</p>
            </div>
        </div>

        <div class="add-btn-wrap">
            <button class="add-btn" onclick="openForm()">＋ 新增支出</button>
        </div>

        <footer>
            <div>💾 data.json 以 AES-256-GCM 加密 | 匯率來源: exchangerate-api.com</div>
        </footer>
    </div>

    <!-- 新增/編輯 Modal -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;" onclick="closeModal(event)">
        <div class="modal-card">
            <h3 id="modal-title" style="margin-bottom:20px;">新增支出</h3>
            <input type="hidden" id="f-id" value="" />

            <div class="form-row">
                <div class="form-group">
                    <label>項目名稱</label>
                    <input type="text" id="f-name" placeholder="例：便利商店" />
                </div>
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="f-date" />
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>分類</label>
                    <select id="f-category">
                        <option value="Food">食物</option>
                        <option value="Transport">交通</option>
                        <option value="Housing">住宿</option>
                        <option value="Flight">機票</option>
                        <option value="Other">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>付款方式</label>
                    <select id="f-payment">
                        <option value="cash">現金</option>
                        <option value="suica">西瓜卡</option>
                        <option value="suica-topup">西瓜卡儲值</option>
                        <option value="card">信用卡</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>金額 (JPY) <span class="hint">台幣支出填 0</span></label>
                    <input type="number" id="f-jpy" placeholder="0" min="0" />
                </div>

            <div class="form-row">
                <div class="form-group">
                    <label>實際台幣 <span class="hint">（選填）</span></label>
                    <input type="number" id="f-twd" placeholder="留空則自動預估" min="0" />
                </div>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="f-paid" />
                <label for="f-paid">已支出</label>
            </div>

            <div class="form-group">
                <label>備註 <span class="hint">（選填）</span></label>
                <input type="text" id="f-notes" placeholder="備註說明" />
            </div>

            <div class="form-group">
                <label>GitHub Token <span class="hint">（會記住）</span></label>
                <input type="password" id="f-token" placeholder="ghp_xxxx 或 gho_xxxx" />
            </div>

            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="submit-btn" onclick="saveExpense()">儲存</button>
                <button class="cancel-btn" onclick="closeModal()">取消</button>
            </div>

            <div id="form-msg" style="margin-top:15px; display:none;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
